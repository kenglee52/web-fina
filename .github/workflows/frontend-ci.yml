name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'w_temage/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'w_temage/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: w_temage/package-lock.json
    
    - name: Install dependencies
      working-directory: ./w_temage
      run: npm ci
    
    - name: Build
      working-directory: ./w_temage
      run: npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    - name: Build and push Docker image
      working-directory: ./w_temage
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fina-frontend:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/fina-frontend:latest
